version: "3.8"

# Axon OS Docker Compose — runs all services in containers.
# Usage: docker compose up -d
# Each service connects to Ollama (host network) and the D-Bus session bus.

x-common-env: &common-env
  PYTHONUNBUFFERED: "1"
  OLLAMA_BASE_URL: http://host.docker.internal:11434
  AXON_DIR: /data/axon
  DBUS_SESSION_BUS_ADDRESS: unix:path=/run/user/1000/bus

services:
  axon-brain:
    build:
      context: ..
      dockerfile: Dockerfile.service
    container_name: axon-brain
    restart: unless-stopped
    environment:
      <<: *common-env
      AXON_SERVICE: brain
    volumes:
      - axon-data:/data/axon
    extra_hosts:
      - host.docker.internal:host-gateway
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:11434/api/tags', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3

  axon-context:
    build:
      context: ..
      dockerfile: Dockerfile.service
    container_name: axon-context
    restart: unless-stopped
    environment:
      <<: *common-env
      AXON_SERVICE: context
    volumes:
      - axon-data:/data/axon
    depends_on:
      axon-brain:
        condition: service_healthy
    extra_hosts:
      - host.docker.internal:host-gateway

  axon-search:
    build:
      context: ..
      dockerfile: Dockerfile.service
    container_name: axon-search
    restart: unless-stopped
    environment:
      <<: *common-env
      AXON_SERVICE: search
    volumes:
      - axon-data:/data/axon
    depends_on:
      axon-brain:
        condition: service_healthy
    extra_hosts:
      - host.docker.internal:host-gateway

  axon-voice:
    build:
      context: ..
      dockerfile: Dockerfile.service
    container_name: axon-voice
    restart: unless-stopped
    environment:
      <<: *common-env
      AXON_SERVICE: voice
    volumes:
      - axon-data:/data/axon
      - /dev/snd:/dev/snd
    devices:
      - /dev/snd:/dev/snd
    privileged: true
    depends_on:
      axon-brain:
        condition: service_healthy
    extra_hosts:
      - host.docker.internal:host-gateway

  axon-gui-agent:
    build:
      context: ..
      dockerfile: Dockerfile.service
    container_name: axon-gui-agent
    restart: unless-stopped
    environment:
      <<: *common-env
      AXON_SERVICE: gui-agent
    volumes:
      - axon-data:/data/axon
    depends_on:
      axon-brain:
        condition: service_healthy
    extra_hosts:
      - host.docker.internal:host-gateway

  axon-sandbox:
    build:
      context: ..
      dockerfile: Dockerfile.service
    container_name: axon-sandbox
    restart: unless-stopped
    environment:
      <<: *common-env
      AXON_SERVICE: sandbox
    volumes:
      - axon-data:/data/axon
    depends_on:
      axon-brain:
        condition: service_healthy
    extra_hosts:
      - host.docker.internal:host-gateway

  axon-global-search:
    build:
      context: ..
      dockerfile: Dockerfile.service
    container_name: axon-global-search
    restart: unless-stopped
    environment:
      <<: *common-env
      AXON_SERVICE: global-search
    volumes:
      - axon-data:/data/axon
    depends_on:
      axon-brain:
        condition: service_healthy
    extra_hosts:
      - host.docker.internal:host-gateway

volumes:
  axon-data:
    driver: local
